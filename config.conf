##############################################
# Sweet Edition 6.0 - Configuration File
##############################################
CURRENT_VERSION="1.0.0"
UPDATE_SOURCE_URL="https://raw.githubusercontent.com/Jim71G/SweetEdition/main/update.json"


# -------------------------------------------
# THEME VARIANT SELECTION
# -------------------------------------------
# Must match a folder name inside:
# SweetAssets/plasma/
# SweetAssets/gtk/
# SweetAssets/icons/
# SweetAssets/cursors/
# SweetAssets/extras/variants/
#
# Examples:
#   Sweet
#   Sweet-Dark
#   Sweet-Purple
#   Sweet-Mars
#   Sweet-Dracula
#
THEME_NAME="Sweet-Purple"


# -------------------------------------------
# MODULE TOGGLES
# -------------------------------------------
# Enable or disable each installer module.
# true  = install module
# false = skip module

ENABLE_PLASMA=true
ENABLE_KVANTUM=true
ENABLE_GTK=true
ENABLE_ICONS=true
ENABLE_CURSORS=true
ENABLE_SDDM=false
ENABLE_WALLPAPERS=true
ENABLE_COLORS=true
ENABLE_AURORAE=true
ENABLE_EXTRAS=true


# -------------------------------------------
# UPDATE SYSTEM
# -------------------------------------------
# Update checker + auto-update engine

ENABLE_UPDATE_CHECK=true
ENABLE_AUTO_UPDATE=true

# URL to your version list JSON
UPDATE_SOURCE_URL="https://example.com/sweet/version-list.json"


# -------------------------------------------
# INSTALLATION PATHS
# -------------------------------------------

PLASMA_DIR="$HOME/.local/share/plasma/desktoptheme"
KVANTUM_DIR="$HOME/.config/Kvantum"
GTK_DIR="$HOME/.themes"
GTK4_DIR="$HOME/.config/gtk-4.0"
ICONS_DIR="$HOME/.icons"
CURSORS_DIR="$HOME/.icons"
SDDM_DIR="/usr/share/sddm/themes"
COLOR_SCHEMES_DIR="$HOME/.local/share/color-schemes"
AURORAE_DIR="$HOME/.local/share/aurorae/themes"
WALLPAPER_DIR="$HOME/Pictures/Wallpapers/Sweet"


# -------------------------------------------
# ASSETS SOURCE PATHS
# -------------------------------------------

ASSETS_ROOT="$HOME/SweetAssets"

ASSETS_PLASMA="$ASSETS_ROOT/plasma"
ASSETS_KVANTUM="$ASSETS_ROOT/kvantum"
ASSETS_GTK="$ASSETS_ROOT/gtk"
ASSETS_ICONS="$ASSETS_ROOT/icons"
ASSETS_CURSORS="$ASSETS_ROOT/cursors"
ASSETS_SDDM="$ASSETS_ROOT/sddm"
ASSETS_COLORS="$ASSETS_ROOT/colors"
ASSETS_AURORAE="$ASSETS_ROOT/aurorae"
ASSETS_WALLPAPERS="$ASSETS_ROOT/wallpapers"

# Extras
ASSETS_EXTRAS_SHARED="$ASSETS_ROOT/extras/shared"
ASSETS_EXTRAS_VARIANT="$ASSETS_ROOT/extras/variants/$THEME_NAME"


# -------------------------------------------
# BACKUP SETTINGS
# -------------------------------------------

ENABLE_BACKUP=true
BACKUP_DIR="$HOME/SweetBackups"


# -------------------------------------------
# LOGGING SETTINGS
# -------------------------------------------

ENABLE_LOGGING=true
LOG_FILE="$HOME/sweet-installer.log"
